server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: node-agent

cae:
  node:
    id: 1
    node-code: "NODE_1"
    node-name: "Worker_Node_1"
    node-port: ${NODE_PORT:${SERVER_PORT:8085}}
    max-concurrency: ${NODE_MAX_CONCURRENCY:2}
    scheduler-base-url: ${SCHEDULER_SERVICE_BASE_URL:http://localhost:8084}
    task-base-url: ${TASK_SERVICE_BASE_URL:http://localhost:8083}
    advertised-host: ${NODE_ADVERTISED_HOST:}
    work-root: ${NODE_WORK_ROOT:./node-agent-work}
    solver-ids: [1]
    solver-versions:
      "1": "v10"
