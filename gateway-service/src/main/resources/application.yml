server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true

gateway:
  security:
    white-list:
      - /api/auth/login
      - /api/auth/logout
      - /api/node-agent/register
      - /api/node-agent/heartbeat
      - /actuator/health
    admin-only-paths:
      - /api/admin/**
      - /api/users/**
      - /api/nodes/**
      - /api/schedules/**
    admin-write-paths:
      - /api/solvers/**
      - /api/profiles/**
      - /api/file-rules/**
