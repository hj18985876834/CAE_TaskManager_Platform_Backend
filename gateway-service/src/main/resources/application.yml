server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true

gateway:
  routes:
    user-service-uri: ${USER_SERVICE_URI:http://localhost:8081}
    solver-service-uri: ${SOLVER_SERVICE_URI:http://localhost:8082}
    scheduler-service-uri: ${SCHEDULER_SERVICE_URI:http://localhost:8084}
    task-service-uri: ${TASK_SERVICE_URI:http://localhost:8083}
  security:
    white-list:
      - /api/auth/login
      - /api/auth/logout
      - /api/node-agent/register
      - /api/node-agent/heartbeat
      - /actuator/health
    admin-only-paths:
      - /api/admin/**
      - /api/users/**
      - /api/nodes/**
      - /api/schedules/**
    admin-write-paths:
      - /api/solvers/**
      - /api/profiles/**
      - /api/file-rules/**
